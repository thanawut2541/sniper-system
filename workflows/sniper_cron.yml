name: Sniper System Cron

on:
  schedule:
    # รันตอนต้นชั่วโมงทุกๆ 1 ชั่วโมง (นาทีที่ 0) ของเซิร์ฟเวอร์ UTC
    - cron: '0 * * * *'
  # อนุญาตให้กดรันเองได้ (Manual trigger)
  workflow_dispatch:

jobs:
  run-sniper-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas

      - name: Run Sniper Bot
        run: python bot.py
